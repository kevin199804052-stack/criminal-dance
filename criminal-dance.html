<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>犯人在跳舞 — 4人單機版</title>
<style>
  /* ---------- 基本樣式 ---------- */
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: "Microsoft JhengHei", system-ui, sans-serif;
    background: #1b1530; color: #f2eefb; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  h1 { font-size: 1.5rem; margin: 16px 0 4px; }
  .sub { color: #b3a8d6; font-size: .85rem; margin-bottom: 12px; }
  #app { width: 100%; max-width: 760px; padding: 0 16px 40px; }

  .panel {
    background: #2a2150; border: 1px solid #4a3d80; border-radius: 14px;
    padding: 20px; margin-top: 14px;
  }
  button {
    font-family: inherit; cursor: pointer; border: none; border-radius: 10px;
    padding: 12px 18px; font-size: 1rem; background: #6c4cd6; color: #fff;
    transition: transform .05s, background .15s; margin: 4px;
  }
  button:hover:not(:disabled) { background: #7e60e8; }
  button:active:not(:disabled) { transform: scale(.97); }
  button:disabled { background: #3a3260; color: #8a80b0; cursor: not-allowed; }
  button.ghost { background: #3a3260; }
  button.ghost:hover:not(:disabled) { background: #4a3d80; }

  input {
    font-family: inherit; padding: 10px 12px; border-radius: 8px;
    border: 1px solid #4a3d80; background: #1b1530; color: #fff;
    font-size: 1rem; width: 100%; margin: 6px 0;
  }

  /* ---------- 卡片 ---------- */
  .hand { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .card {
    width: 110px; min-height: 140px; border-radius: 12px; padding: 10px;
    background: linear-gradient(160deg,#fff,#e9e2ff); color: #2a2150;
    display: flex; flex-direction: column; cursor: pointer;
    border: 3px solid transparent; transition: transform .08s, border .15s;
    text-align: left;
  }
  .card:hover.playable { transform: translateY(-6px); border-color: #ffd34d; }
  .card.playable { border-color: #6c4cd6; }
  .card.disabled { opacity: .5; cursor: not-allowed; filter: grayscale(.5); }
  .card .cname { font-weight: 700; font-size: 1.05rem; }
  .card .cdesc { font-size: .72rem; margin-top: 6px; flex: 1; line-height: 1.3; }
  .card .cwhy { font-size: .68rem; color: #b02a4a; margin-top: 4px; }
  .card.crime { background: linear-gradient(160deg,#ffd9d9,#ff9e9e); }

  .badge { display:inline-block; background:#6c4cd6; border-radius:20px;
           padding:4px 12px; font-size:.85rem; margin:2px; }
  .log { background:#171127; border-radius:10px; padding:12px; margin-top:14px;
         max-height:180px; overflow-y:auto; font-size:.85rem; line-height:1.6; }
  .log div { padding:2px 0; border-bottom:1px solid #2a2150; }
  .big { font-size:1.3rem; font-weight:700; margin:10px 0; }
  .center { text-align:center; }
  .win { background: linear-gradient(160deg,#2a2150,#4a2d6e); }
  /* 遊戲結束跳舞動畫 */
  @keyframes dance {
    0%   { transform: translateY(0)    rotate(-14deg); }
    25%  { transform: translateY(-22px) rotate(14deg) scale(1.1); }
    50%  { transform: translateY(0)    rotate(-14deg); }
    75%  { transform: translateY(-22px) rotate(14deg) scale(1.1); }
    100% { transform: translateY(0)    rotate(-14deg); }
  }
  .dancers { text-align:center; margin:14px 0 4px; line-height:1; }
  .dancers span { display:inline-block; font-size:3.2rem; margin:0 2px; animation: dance .55s ease-in-out infinite; }
  .dancers span:nth-child(2){ animation-delay:.12s }
  .dancers span:nth-child(3){ animation-delay:.24s }
  .dancers span:nth-child(4){ animation-delay:.36s }
  .dancers span:nth-child(5){ animation-delay:.48s }
  /* 彩蛋煙火 */
  @keyframes fwburst { 0%{transform:scale(0);opacity:0} 25%{opacity:1} 70%{transform:scale(1.7);opacity:1} 100%{transform:scale(2.2);opacity:0} }
  .fw { position:fixed; inset:0; pointer-events:none; z-index:95; overflow:hidden; }
  .fw span { position:absolute; font-size:2.6rem; animation:fwburst 1.3s ease-out infinite; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<body>
  <h1>🕺 犯人在跳舞</h1>
  <div class="sub">本機同桌 ＆ 線上連線</div>
  <div id="app"></div>
  <div style="position:fixed;right:8px;bottom:6px;font-size:.7rem;color:#6a5fa0;z-index:90;">build v27 · 無牌可打彩蛋(煙火+10分勝)/結束離開回輸房號畫面</div>
  <div id="toast" style="position:fixed;left:50%;bottom:30px;transform:translateX(-50%);
       background:#b02a4a;color:#fff;padding:12px 20px;border-radius:10px;font-size:1rem;
       opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;max-width:90%;"></div>

<script>
// 提示：點到不能打的牌時告訴玩家原因
let toastTimer=null;
window.nope = (msg)=>{
  const t=document.getElementById("toast");
  t.textContent="⚠ "+msg;
  t.style.opacity="1";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.style.opacity="0"; }, 1800);
};
</script>
<script>
/* =========================================================
   犯人在跳舞 — 4人單機原型
   規則：標準版 4 人，使用 16 張牌，每人發 4 張。
   注意：標示「※簡化」處與正式桌遊略有出入，之後可再調整。
========================================================= */

// ---------- 卡片資料 ----------
const CARDS = {
  firstFinder: { name:"第一發現者", desc:"開場牌：打出後遊戲正式開始，無其他效果。" },
  criminal:    { name:"犯人",       desc:"你就是犯人！只有當這是你最後一張手牌時才能打出，打出即逃脫成功獲勝。", crime:true },
  detective:   { name:"偵探",       desc:"手牌≤3張可打出。指定一人猜「你就是犯人」，猜中即獲勝（對方有不在場證明可免疫）。" },
  alibi:       { name:"不在場證明", desc:"與犯人牌一起持有時，被偵探指認可宣告「不是犯人」（不需棄掉，可重複）。單獨打出無效果。" },
  accomplice:  { name:"共犯",       desc:"打出後加入犯人陣營：犯人贏你就贏。" },
  witness:     { name:"目擊者",     desc:"指定一人，偷看他的全部手牌。" },
  infoManip:   { name:"情報交換",   desc:"全體同時把一張手牌傳給左邊的人，每人自己選要傳哪張。" },
  rumor:       { name:"謠言",       desc:"全體同時從右邊的人手牌盲抽一張。" },
  trade:       { name:"交易",       desc:"指定一人，你給他一張（你選），盲抽回他一張。" },
  boy:         { name:"少年",       desc:"得知誰是犯人（誰持有犯人牌）。" },
  dog:         { name:"神犬",       desc:"指定一人，由他自己選一張棄掉；若棄到犯人牌你獲勝，否則神犬牌交給他。" },
  inspector:   { name:"警部",       desc:"手牌≤3可打，指定一人並公開盯著他；遊戲結束時他若仍持有犯人牌，你獲勝（+3）。（在手上時不公開）" },
  citizen:     { name:"一般人",     desc:"無效果（煙霧彈）。" },
};

// 標準 32 張卡池（各卡最大張數）
const CARD_POOL = { firstFinder:1, criminal:1, detective:4, alibi:5, accomplice:2,
  witness:3, infoManip:3, rumor:4, trade:5, boy:1, dog:1, citizen:2 };
// 依人數的必要牌（其餘從牌池隨機補滿到 人數×4）
const MANDATORY = {
  3:{ detective:1, alibi:1 },                  // 3人不放共犯
  4:{ detective:1, alibi:1, accomplice:1 },
  5:{ detective:1, alibi:2, accomplice:1 },
  6:{ detective:2, alibi:2, accomplice:2 },
  7:{ detective:2, alibi:3, accomplice:2 },
};
// 依人數組牌（N=玩家數）；withInspector=true 時用警部替換一張神犬
function buildDeck(N, withInspector){
  const total=N*4; let deck=[];
  if(N>=8){
    for(const c in CARD_POOL) for(let k=0;k<CARD_POOL[c];k++) deck.push(c);  // 8人=全32張
  } else {
    deck.push("firstFinder","criminal");
    const m=MANDATORY[N]||{};
    for(const c in m) for(let k=0;k<m[c];k++) deck.push(c);
    const used={}; deck.forEach(c=>used[c]=(used[c]||0)+1);
    let bag=[];
    for(const c in CARD_POOL){
      if(c==="firstFinder"||c==="criminal") continue;     // 固定各1張
      if(N===3 && c==="accomplice") continue;             // 3人不放共犯
      for(let k=0;k<CARD_POOL[c]-(used[c]||0);k++) bag.push(c);
    }
    bag=shuffle(bag);
    while(deck.length<total && bag.length) deck.push(bag.pop());
  }
  if(withInspector && deck.indexOf("inspector")<0){
    let i=deck.indexOf("citizen");                                  // 優先替換一般人，保留神犬→兩者共存
    if(i<0) i=deck.findIndex(c=>c!=="dog"&&c!=="criminal"&&c!=="firstFinder");
    if(i>=0) deck[i]="inspector";
  }
  return shuffle(deck);
}

let state = null;
let scores = [0,0,0,0];     // 跨局累積總分
let playerNames = null;     // 記住玩家名字，下一局沿用
let WIN_SCORE = 10;         // 賽末門檻：累積總分先達此分且為唯一最高者，贏得整場
let mode = null;            // null=主選單 / 'local'=本機同桌 / 'online'=線上連線
let withInspector = true;   // 是否加入警部牌（替換一張神犬）
let setupCount = 4;         // 設定畫面選的人數
let setupNames = null;      // 設定畫面暫存的名字
function winScoreFor(n){ return n<=5 ? 5 : 10; }   // 賽末門檻隨人數
const app = document.getElementById("app");

// 依結局計算本局各人得分（回傳長度4陣列）
function pointsFor(type, winnerIdx, criminalIdx){
  const N=state.players.length;
  const pts=new Array(N).fill(0);
  for(let i=0;i<N;i++){
    const isVillain = (i===criminalIdx) || state.players[i].accomplice;
    if(type==='escape'){ pts[i]= isVillain?2:0; }       // 犯人逃脫：犯人+共犯各+2
    else if(i===winnerIdx){ pts[i]= (type==='dog'?3:2); } // 神犬+3 / 偵探+2
    else if(isVillain){ pts[i]=0; }
    else { pts[i]=1; }                                    // 其他平民+1
  }
  return pts;
}

// ---------- 工具 ----------
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function log(msg){ state.log.unshift(msg); }
function pname(i){ return state.players[i].name; }
function nextActive(from){
  const N=state.players.length;
  for(let k=1;k<=N;k++){ const i=(from+k)%N; if(state.players[i].hand.length>0) return i; }
  return -1; // 沒人有牌
}
function holderOfCriminal(){ return state.players.findIndex(p=>p.hand.includes("criminal")); }

// ---------- 開新局 ----------
function newGame(names){
  const deck = buildDeck(names.length, withInspector);
  const players = names.map((n,i)=>({
    name:n, hand:deck.slice(i*4,i*4+4), accomplice:false
  }));
  const starter = players.findIndex(p=>p.hand.includes("firstFinder"));
  state = {
    players, current:starter, firstMoveDone:false,
    phase:"pass", log:[], pending:null, gameover:null,
    inspector:null,   // 警部：{by:出牌者, target:被盯的人}，遊戲結束時結算
  };
  log(`遊戲開始！由持有「第一發現者」的 ${players[starter].name} 先手。`);
  render();
}

// ---------- 出牌可否 ----------
function playable(card){
  const p = state.players[state.current];
  // 第一回合：先手必須先打第一發現者
  if(!state.firstMoveDone){
    if(card==="firstFinder") return {ok:true};
    return {ok:false, why:"開場必須先打第一發現者"};
  }
  if(card==="criminal" && p.hand.length!==1) return {ok:false, why:"只能在最後一張時打出"};
  if(card==="detective" && p.hand.length>3) return {ok:false, why:"手牌需≤3張"};
  if(card==="inspector" && p.hand.length>3) return {ok:false, why:"手牌需≤3張"};
  return {ok:true};
}

// ---------- 渲染 ----------
function render(){
  if(mode==='online'){ netRender(); return; }
  if(state===null){ mode==='local' ? renderSetup() : renderLanding(); return; }
  if(state.gameover){ renderGameOver(); return; }
  switch(state.phase){
    case "pass":   renderPass(); break;
    case "turn":   renderTurn(); break;
    case "target": renderTarget(); break;
    case "tradeGive": renderTradeGive(); break;
    case "tradePass": renderTradePass(); break;
    case "tradeReceive": renderTradeReceive(); break;
    case "dogPass": renderDogPass(); break;
    case "dogDiscard": renderDogDiscard(); break;
    case "infoSwapPass": renderInfoSwapPass(); break;
    case "infoSwapPick": renderInfoSwapPick(); break;
    case "reveal": renderReveal(); break;
  }
}

function captureSetupNames(){
  const a=[]; for(let i=0;i<setupCount;i++){ const el=document.getElementById('n'+i); if(el)a.push(el.value); }
  setupNames=a;
}
function renderSetup(){
  const defs = setupNames || playerNames || ["Erica04","一直委曲求全","微末狂龍","挖玨機"];
  const opts=[3,4,5,6,7,8].map(n=>`<option value="${n}" ${n===setupCount?'selected':''}>${n} 人</option>`).join("");
  let inputs="";
  for(let i=0;i<setupCount;i++){
    const v = defs[i]!==undefined ? defs[i] : ('玩家'+(i+1));
    inputs += `<input id="n${i}" placeholder="玩家 ${i+1}" value="${v}">`;
  }
  app.innerHTML = `
    <div class="panel">
      <div class="big">本機同桌</div>
      <label>人數：
        <select id="pcount" onchange="captureSetupNames();setupCount=+this.value;render()" style="font-size:1rem;padding:6px;border-radius:8px">${opts}</select>
      </label>
      <label style="display:block;margin:10px 0">
        <input type="checkbox" id="useInspector" ${withInspector?'checked':''} onchange="withInspector=this.checked"> 加入警部牌（替換一張神犬）
      </label>
      ${inputs}
      <button onclick="startGame()">開始遊戲</button>
      <button class="ghost" onclick="mode=null;render()">← 回主選單</button>
    </div>
    <div class="panel">
      <div class="big">怎麼玩</div>
      <div style="font-size:.9rem;line-height:1.7">
        這是「同桌輪流」版：大家共用這一台裝置。<br>
        輪到誰，就把畫面交給誰；換人前會有「請交給下一位」的遮擋畫面，避免偷看手牌。<br>
        目標：偵探/狗找出犯人，犯人想辦法把犯人牌留到最後一張打出逃脫。
      </div>
    </div>`;
}
window.startGame = ()=>{
  const count=setupCount;
  const names=[]; for(let i=0;i<count;i++){ const el=document.getElementById("n"+i); names.push((el&&el.value.trim())||("玩家"+(i+1))); }
  withInspector = document.getElementById("useInspector").checked;
  playerNames = names; setupNames = names;
  scores = new Array(count).fill(0);   // 新一輪比賽，分數歸零（長度＝人數）
  WIN_SCORE = winScoreFor(count);      // 賽末門檻隨人數
  newGame(names);
};
window.nextRound = ()=>{ newGame(playerNames); };               // 保留總分，重新發牌
window.resetAll = ()=>{ scores=[0,0,0,0]; state=null; render(); }; // 回到設定畫面

function renderPass(){
  app.innerHTML = `
    <div class="panel center">
      <div class="big">請把裝置交給</div>
      <div class="big" style="font-size:2rem;color:#ffd34d">${pname(state.current)}</div>
      <div class="sub">其他人請勿偷看 👀</div>
      <button onclick="state.phase='turn';render()">我是 ${pname(state.current)}，開始回合</button>
      ${scoreStrip()}
    </div>
    ${inspectorBanner()}
    ${logHtml()}`;
}

function renderTurn(){
  const p = state.players[state.current];
  const cards = p.hand.map((c,idx)=>{
    const info=CARDS[c]; const pl=playable(c);
    return `<div class="card ${info.crime?'crime':''} ${pl.ok?'playable':'disabled'}"
                 onclick="${pl.ok?`playCard(${idx})`:`nope('${pl.why}')`}">
              <div class="cname">${info.name}</div>
              <div class="cdesc">${info.desc}</div>
              ${pl.ok?'':`<div class="cwhy">✗ ${pl.why}</div>`}
            </div>`;
  }).join("");
  app.innerHTML = `
    <div class="panel">
      <div class="big">${p.name} 的回合</div>
      <div class="sub">手牌 ${p.hand.length} 張 · 點一張可打出的牌</div>
      <div class="hand">${cards}</div>
    </div>
    ${inspectorBanner()}
    ${logHtml()}`;
}

function renderTarget(){
  const opts = state.players.map((p,i)=> i===state.current ? "" :
      `<button onclick="chooseTarget(${i})">${p.name}（${p.hand.length}張）</button>`).join("");
  app.innerHTML = `
    <div class="panel">
      <div class="big">${CARDS[state.pending.card].name}：選擇目標</div>
      <div>${opts}</div>
      <button class="ghost" onclick="cancelPlay()">取消</button>
    </div>
    ${logHtml()}`;
}

function renderTradeGive(){
  const p=state.players[state.current];
  const cards=p.hand.map((c,idx)=>`
     <div class="card ${CARDS[c].crime?'crime':''} playable" onclick="doTradeGive(${idx})">
       <div class="cname">${CARDS[c].name}</div>
       <div class="cdesc">${CARDS[c].desc}</div>
     </div>`).join("");
  app.innerHTML=`
    <div class="panel">
      <div class="big">交易：選一張給 ${pname(state.pending.target)}</div>
      <div class="hand">${cards}</div>
    </div>${logHtml()}`;
}

function renderTradePass(){
  const t=state.pending.target;
  app.innerHTML=`
    <div class="panel center">
      <div class="big">🔁 交易！請把裝置交給</div>
      <div class="big" style="font-size:2rem;color:#ffd34d">${pname(t)}</div>
      <div class="sub">${pname(state.current)} 想跟你交換一張牌，請也選一張交換出去</div>
      <button onclick="state.phase='tradeReceive';render()">我是 ${pname(t)}，選擇交換</button>
    </div>
    ${logHtml()}`;
}

function renderTradeReceive(){
  const t=state.pending.target, tp=state.players[t];
  const cards=tp.hand.map((c,idx)=>`
     <div class="card ${CARDS[c].crime?'crime':''} playable" onclick="tradeReceiveCard(${idx})">
       <div class="cname">${CARDS[c].name}</div>
       <div class="cdesc">${CARDS[c].desc}</div>
     </div>`).join("");
  app.innerHTML=`
    <div class="panel">
      <div class="big">${pname(t)}：選一張交換給 ${pname(state.current)}</div>
      <div class="sub">你拿不到對方選的是哪張，互相盲換</div>
      <div class="hand">${cards}</div>
    </div>${logHtml()}`;
}

function renderDogPass(){
  const t=state.pending.target;
  app.innerHTML = `
    <div class="panel center">
      <div class="big">🐕 神犬出動！請把裝置交給</div>
      <div class="big" style="font-size:2rem;color:#ffd34d">${pname(t)}</div>
      <div class="sub">${pname(state.pending.dogPlayer)} 派神犬來調查你，你必須棄掉一張手牌</div>
      <button onclick="state.phase='dogDiscard';render()">我是 ${pname(t)}，選擇棄牌</button>
    </div>
    ${logHtml()}`;
}

function renderDogDiscard(){
  const t=state.pending.target, tp=state.players[t];
  const cards=tp.hand.map((c,idx)=>`
     <div class="card ${CARDS[c].crime?'crime':''} playable" onclick="dogDiscard(${idx})">
       <div class="cname">${CARDS[c].name}</div>
       <div class="cdesc">${CARDS[c].desc}</div>
     </div>`).join("");
  app.innerHTML=`
    <div class="panel">
      <div class="big">${pname(t)}：選一張棄掉</div>
      <div class="sub">⚠ 若棄出犯人牌，派神犬的 ${pname(state.pending.dogPlayer)} 將獲勝！</div>
      <div class="hand">${cards}</div>
    </div>${logHtml()}`;
}

function renderInfoSwapPass(){
  const p=state.pending, cur=p.queue[p.qi];
  app.innerHTML=`
    <div class="panel center">
      <div class="big">🔄 情報交換！請把裝置交給</div>
      <div class="big" style="font-size:2rem;color:#ffd34d">${pname(cur)}</div>
      <div class="sub">每人各選一張牌傳給左邊（${p.qi+1}/${p.queue.length}）</div>

// ---------- 出牌主流程 ----------
window.playCard = (idx)=>{
  const p=state.players[state.current];
  const card=p.hand[idx];
  if(!playable(card).ok) return;

  // 需要選目標的牌：先進入選目標階段（牌還沒移除）
  if(["detective","witness","trade","dog","inspector"].includes(card)){
    state.pending={card, cardIdx:idx};
    state.phase="target"; render(); return;
  }
  // 其餘直接結算
  resolveSimple(card, idx);
};

window.cancelPlay = ()=>{ state.pending=null; state.phase="turn"; render(); };

window.chooseTarget = (t)=>{
  const card=state.pending.card;
  if(card==="trade"){
    // 先把交易牌本身打出移除，之後「選一張給對方」就不會列到它、也不會索引錯位
    const me=state.players[state.current], tp=state.players[t];
    me.hand.splice(state.pending.cardIdx,1);
    state.firstMoveDone=true;
    state.pending.target=t;
    if(me.hand.length===0 && tp.hand.length===0){   // 雙方都沒牌 → 落空
      log(`${me.name} 打出交易，但雙方都沒牌可換。`);
      state.pending=null; endTurn(); return;
    }
    if(mode==='online'){ state.pending.tradePicks={}; state.phase="tradeGive"; render(); return; }  // 線上雙方同時選；單向由 resolveTradeOnline 處理
    // 本機同桌：出牌者沒牌可給 → 跳過自己，直接由對方選一張給我（單向）
    if(me.hand.length===0){ state.pending.giveCard=null; state.phase="tradePass"; render(); return; }
    state.phase="tradeGive"; render(); return;
  }
  resolveTargeted(card, state.pending.cardIdx, t);
};

window.doTradeGive = (giveIdx)=>{
  const me=state.players[state.current], t=state.pending.target, tp=state.players[t];
  state.pending.giveCard = me.hand.splice(giveIdx,1)[0];  // 我選定的牌（先抽離手牌）
  if(tp.hand.length===0){
    // 對方沒牌可換：直接把我的牌給他
    tp.hand.push(state.pending.giveCard);
    log(`${me.name} 把一張牌交給了 ${tp.name}（對方無牌可換）。`);
    state.pending=null; endTurn(); return;
  }
  state.phase="tradePass"; render();    // 把裝置交給對方，由他也選一張
};

// 對方選一張交換
window.tradeReceiveCard = (idx)=>{
  const me=state.players[state.current], t=state.pending.target, tp=state.players[t];
  const theirCard=tp.hand.splice(idx,1)[0];
  me.hand.push(theirCard);                  // 對方選的牌 → 給我
  if(state.pending.giveCard!=null) tp.hand.push(state.pending.giveCard);  // 我選的牌→給對方（單向時 null 則不給）
  log(`${me.name} 與 ${tp.name} 交換了手牌。`);
  state.pending=null;
  endTurn();
};

// 移除手牌中第一張指定類型
function removeCard(p, card){ const i=p.hand.indexOf(card); if(i>=0) p.hand.splice(i,1); }

// 不需目標的牌
function resolveSimple(card, idx){
  const me=state.players[state.current];
  me.hand.splice(idx,1); // 移除打出的牌
  state.firstMoveDone = true;

  switch(card){
    case "firstFinder":
      log(`${me.name} 打出「第一發現者」：有人犯案了！遊戲開始。`); endTurn(); break;
    case "citizen":
      log(`${me.name} 打出「一般人」（無事發生）。`); endTurn(); break;
    case "alibi":
      log(`${me.name} 打出「不在場證明」（單獨打出無效果）。`); endTurn(); break;
    case "accomplice":
      me.accomplice=true;
      log(`${me.name} 打出「共犯」，加入了犯人陣營。`); endTurn(); break;
    case "boy":{
      const cr=holderOfCriminal();
      log(`${me.name} 打出「少年」，偷偷確認了犯人身分。`);
      showReveal("少年：你看見了…", cr<0?"目前沒有人持有犯人牌。":`<b style="color:#ffd34d">${pname(cr)}</b> 持有犯人牌！`);
      break;
    }
    case "infoManip":{
      // 全體各自選一張傳給左邊：依序把畫面交給每位有手牌的玩家來選
      startInfoSwap();
      break;
    }
    case "rumor":{
      doRumor();
      log(`「謠言」：全體從右邊盲抽了一張牌。`);
      endTurn(); break;
    }
    case "criminal":{
      // 警部一直盯著這位「犯人本人」→ 打出犯人牌的當下身分即犯人，警部當場逮捕（官方：遊戲結束時該玩家是犯人則警部勝）
      if(state.inspector && state.inspector.target===state.current){
        const by=state.inspector.by;
        log(`${me.name} 想打出犯人牌逃脫，但被警部 ${pname(by)} 盯住，當場被捕！`);
        gameOver("警部當場逮捕！",
          `<b>${pname(by)}</b> 的警部盯住了犯人 <b>${me.name}</b>，逃脫失敗、當場被捕！<br>`+
          `🏆 警部 +3，其他平民 +1，犯人陣營 0。`,
          pointsFor('dog', by, state.current));
        break;
      }
      // 否則：只有最後一張能打 → 逃脫成功
      const accs=state.players.filter(p=>p.accomplice).map(p=>p.name);
      gameOver("犯人逃脫成功！",
        `<b>${me.name}</b> 成功把犯人牌留到最後打出，逃之夭夭！<br>`+
        (accs.length?`共犯 ${accs.join("、")} 一同獲勝。<br>`:"")+
        `🏆 犯人${accs.length?"與共犯":""}獲勝（+2），其他人 0 分。`,
        pointsFor('escape', state.current, state.current));
      break;
    }
  }
}

// 情報交換：依序讓每位有手牌的玩家自選一張，全部選完後同時傳給左邊
function startInfoSwap(){
  const queue=state.players.map((_,i)=>i).filter(i=>state.players[i].hand.length>0);
  if(queue.length===0){ log(`「情報交換」：沒有人有手牌可傳。`); endTurn(); return; }
  state.pending={ type:'infoSwap', queue, qi:0, picks:{} };
  state.phase='infoSwapPass'; render();
}
window.infoSwapPick=(idx)=>{
  const p=state.pending; const cur=p.queue[p.qi];
  p.picks[cur]=state.players[cur].hand[idx];   // 記下選的牌
  p.qi++;
  if(p.qi<p.queue.length){ state.phase='infoSwapPass'; render(); return; }
  // 全部選完 → 先全部抽離，再同時發給各自左邊（i 的左邊 = (i-1+N)%N）
  const N=state.players.length;
  Object.entries(p.picks).forEach(([i,card])=>{ removeCard(state.players[i], card); });
  Object.entries(p.picks).forEach(([i,card])=>{ state.players[((+i)+N-1)%N].hand.push(card); });
  log(`「情報交換」：全體各自選一張傳給了左邊。`);
  state.pending=null; endTurn();
};
function doRumor(){
  // 每人從右邊(i+1)盲抽一張，用 snapshot 同時進行
  const N=state.players.length;
  const snap=state.players.map(p=>[...p.hand]);
  const taken=state.players.map(()=>null);
  state.players.forEach((p,i)=>{
    const right=(i+1)%N; const rh=snap[right];
    if(rh.length){ taken[i]=rh[Math.random()*rh.length|0]; }
  });
  // 移除被抽走的（注意可能重複類型，逐一移除一張）
  taken.forEach((c,i)=>{ if(c!==null) removeCard(state.players[(i+1)%N], c); });
  taken.forEach((c,i)=>{ if(c!==null) state.players[i].hand.push(c); });
}

// 需要目標的牌
function resolveTargeted(card, idx, t){
  const me=state.players[state.current];
  const tp=state.players[t];
  me.hand.splice(idx,1); // 移除打出的牌
  state.firstMoveDone=true;
  state.pending=null;

  switch(card){
    case "detective":{
      const targetIsCriminal = tp.hand.includes("criminal");
      if(targetIsCriminal && tp.hand.includes("alibi")){
        log(`${me.name} 用偵探指認 ${tp.name}…但對方宣告「我不是犯人」（不在場證明，不需棄掉）！指認失敗。`);
        endTurn();
      } else if(targetIsCriminal){
        log(`${me.name} 用偵探指認 ${tp.name} → 正是犯人！`);
        const accs=state.players.filter(p=>p.accomplice).map(p=>p.name);
        gameOver("偵探破案！",
          `<b>${me.name}</b> 成功指認 <b>${tp.name}</b> 為犯人！<br>`+
          `🏆 偵探 +2，其他平民 +1，犯人${accs.length?"與共犯":""} 0 分。`,
          pointsFor('detective', state.current, t));
      } else {
        log(`${me.name} 用偵探指認 ${tp.name} → 猜錯了！${tp.name} 不是犯人。`);
        endTurn();
      }
      break;
    }
    case "witness":{
      log(`${me.name} 打出「目擊者」，偷看了 ${tp.name} 的手牌。`);
      const list = tp.hand.length
        ? tp.hand.map(c=>`<b style="color:#ffd34d">${CARDS[c].name}</b><br>`+
            `<span style="font-size:.8rem;color:#b3a8d6">${CARDS[c].desc}</span>`
          ).join(`<hr style="border-color:#4a3d80;margin:8px 0">`)
        : "（空手）";
      showReveal(`目擊者：${tp.name} 的手牌（${tp.hand.length}張）`, list);
      break;
    }
    case "dog":{
      if(tp.hand.length===0){ log(`${tp.name} 沒有手牌，神犬無效。`); endTurn(); break; }
      // 把畫面交給被指定的人，由他自己選一張棄牌
      log(`${me.name} 派出神犬調查 ${tp.name}。`);
      state.pending={dogPlayer:state.current, target:t};
      state.phase="dogPass"; render();
      break;
    }
    case "inspector":{
      // 不立即結算：放在 tp 面前，記錄起來，遊戲結束時於 gameOver 結算
      state.inspector={ by:state.current, target:t };
      log(`${me.name} 打出警部，公開盯上了 ${tp.name}（將於遊戲結束結算）。`);
      endTurn();
      break;
    }
  }
}

// reveal 後續：顯示給當前玩家看的私密資訊，看完才換人
function showReveal(title, body){

// 神犬：被指定者選一張棄掉
window.dogDiscard = (idx)=>{
  const dogP=state.pending.dogPlayer, t=state.pending.target;
  const me=state.players[dogP], tp=state.players[t];
  const discarded=tp.hand.splice(idx,1)[0];
  if(discarded==="criminal"){
    log(`${tp.name} 被神犬逼得棄出了犯人牌！`);
    const accs=state.players.filter(p=>p.accomplice).map(p=>p.name);
    gameOver("神犬立大功！",
      `<b>${me.name}</b> 的神犬讓 ${tp.name} 棄出犯人牌！<br>`+

  } else {

    state.pending=null;
    endTurn();
  }
};

// ---------- 回合結束 ----------
// 某座位手上是否「至少有一張可打的牌」
function hasPlayable(seat){
  const p=state.players[seat];
  return p.hand.some(c=>{
    if(!state.firstMoveDone) return c==='firstFinder';
    if(c==='criminal') return p.hand.length===1;
    if(c==='detective'||c==='inspector') return p.hand.length<=3;
    return true;
  });
}
function endTurn(){
  // 檢查是否還有人有牌
  const total=state.players.reduce((s,p)=>s+p.hand.length,0);
  if(total===0){
    gameOver("和局", "所有手牌都打完了，沒有人達成勝利條件。"); return;
  }
  const nxt=nextActive(state.current);
  if(nxt<0){ gameOver("和局","沒有人還有手牌。"); return; }
  // 🎆 隱藏彩蛋：輪到的人手上「完全沒有可打的牌」（如 偵探,偵探,警部,犯人）→ 超稀有，直接 +10 分贏整場
  if(!hasPlayable(nxt)){
    const pts=new Array(state.players.length).fill(0); pts[nxt]=10;
    const hand=state.players[nxt].hand.map(c=>CARDS[c].name).join('、');
    gameOver('🎆 天降好運（隱藏彩蛋）！',
      `<b>${pname(nxt)}</b> 拿到一手完全打不出去的牌（${hand}），觸發超稀有彩蛋——直接 +10 分、贏得整場！`,
      pts, true);
    return;
  }
  state.current=nxt;
  state.phase="pass";
  render();
}

function gameOver(title, body, points, easter){
  points = (points || [0,0,0,0]).slice();
  // 警部結算：遊戲結束時，被盯的人若仍持有犯人牌 → 比照神犬 +3，與原結局並存（逐人取較高分）
  let inspectorHit=false;
  if(state.inspector && state.players[state.inspector.target] &&
     state.players[state.inspector.target].hand.includes("criminal")){
    inspectorHit=true;
    const ip=pointsFor('dog', state.inspector.by, state.inspector.target);
    points = points.map((p,i)=>Math.max(p, ip[i]));
    body += `<br>👮 警部 ${pname(state.inspector.by)} 指認 ${pname(state.inspector.target)} 成功！（+3）`;
  }
  points.forEach((pt,i)=>{ scores[i]+=pt; });   // 計入累積總分
  // 賽末判定：累積最高分達門檻、且為「唯一」最高者 → 贏得整場；同分並列則續賽
  const max=Math.max(...scores);
  const leaders=state.players.map((_,i)=>i).filter(i=>scores[i]===max);
  const matchWinner = (max>=WIN_SCORE && leaders.length===1) ? leaders[0] : null;
  state.gameover={title, body, points, matchWinner, easter:!!easter};
  // 顯示所有人手牌真相
  const truth=state.players.map(p=>`${p.name}: ${p.hand.map(c=>CARDS[c].name).join("、")||"空手"}`).join("<br>");
  state.gameover.body += `<hr style="border-color:#4a3d80"><div style="font-size:.85rem;color:#b3a8d6">結算時手牌：<br>${truth}</div>`;
  render();
}

// 累積分數表（roundPoints 有給就在後面標本局 +N）
function scoreHtml(roundPoints){
  const order=[...state.players.keys()].sort((a,b)=>scores[b]-scores[a]);
  const rows=order.map(i=>{
    const rp = roundPoints? ` <span style="color:#7CFC9B">(本局+${roundPoints[i]})</span>`:'';
    return `<tr><td style="padding:5px 12px">${state.players[i].name}</td>
      <td style="padding:5px 12px;text-align:right;font-weight:700;font-size:1.1rem">${scores[i]}${rp}</td></tr>`;
  }).join("");
  return `<div class="panel"><div class="big">📊 累積總分</div>
    <table style="width:100%;border-collapse:collapse">${rows}</table></div>`;
}

  return id;
}
function loadName(){ try{ return localStorage.getItem('cd_name')||''; }catch(e){ return ''; } }   // 記住上次輸入的名字
function saveName(n){ try{ localStorage.setItem('cd_name', n); }catch(e){} }
window.enterOnline=()=>{
  mode='online';
  net={ phase:'entry', code:null, playerId:getPlayerId(),
        myName:loadName(), isHost:false, room:null };
  render();
};

function genCode(){ const a='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<4;i++)s+=a[Math.random()*a.length|0]; return s; }

window.createRoom=async ()=>{
  const name=(document.getElementById('myname').value||'').trim();
  if(!name){ nope('請先輸入你的名字'); return; }
  net.myName=name; saveName(name); net.isHost=true; fbInit();
  const code=genCode(); net.code=code;
  await db.ref('rooms/'+code).set({
    host: net.playerId, status:'lobby',
    createdAt: firebase.database.ServerValue.TIMESTAMP,
    players:{ [net.playerId]:{ name, joinedAt: firebase.database.ServerValue.TIMESTAMP } }
  });
  attachRoom(code);
};

window.joinRoom=async ()=>{
  const name=(document.getElementById('myname').value||'').trim();
  const code=(document.getElementById('roomcode').value||'').trim().toUpperCase();
  if(!name){ nope('請先輸入你的名字'); return; }
  if(code.length!==4){ nope('房號是 4 個字'); return; }
  net.myName=name; saveName(name); net.code=code; fbInit();
  const roomRef=db.ref('rooms/'+code);
  const room=(await roomRef.once('value')).val();
  if(!room){ nope('找不到這個房間'); return; }
  if(room.status!=='lobby'){ nope('遊戲已開始，無法加入'); return; }
  if(room.players && Object.keys(room.players).length>=8){ nope('房間已滿（最多 8 人）'); return; }
  await roomRef.child('players/'+net.playerId).set({ name, joinedAt: firebase.database.ServerValue.TIMESTAMP });
  attachRoom(code);
};

function attachRoom(code){
  const roomRef=db.ref('rooms/'+code);
  roomRef.child('players/'+net.playerId).onDisconnect().remove();  // 斷線自動退出
  net.ref=roomRef; net.phase='lobby';
  roomRef.on('value',(snap)=>{
    net.room=snap.val();
    if(!net.room){ nope('房間已關閉'); leaveRoom(); return; }
    // 房主不在了 → 由剩餘玩家中 id 最小者負責「隨機」指派一位新房主（單一寫入避免衝突）
    const pids=net.room.players?Object.keys(net.room.players):[];
    if(pids.length>0 && !pids.includes(net.room.host)){
      const realPids=pids.filter(p=>!net.room.players[p].bot);   // 機器人不能當房主
      if(realPids.length===0){ nope('房間已無真人，關閉'); leaveRoom(); return; }
      if([...realPids].sort()[0]===net.playerId){
        roomRef.child('host').set(realPids[Math.floor(Math.random()*realPids.length)]);
      }
      return; // 等 host 欄位更新後此監聽會再次觸發
    }
    net.isHost = net.room.host===net.playerId;
    if(net.room.status==='playing'){
      if(net.phase!=='game'){ net.phase='game'; if(!net.isHost) subscribeGame(); }
    } else { // lobby
      if(net.phase==='game'){ net.phase='lobby'; clearTurnTimer(); }   // 本局結束/被中止 → 回大廳
    }
    render();
  });
}

window.leaveRoom=()=>{
  clearTurnTimer();
  if(net&&net.ref&&db){
    const players=(net.room&&net.room.players)||{};
    const humansLeft=Object.keys(players).filter(pid=>pid!==net.playerId && !players[pid].bot);
    net.ref.off();
    if(humansLeft.length===0) db.ref('rooms/'+net.code).remove();   // 真人都退光（只剩機器人/沒人）→ 關閉整個房間
    else net.ref.child('players/'+net.playerId).remove();
  }
  net=null; mode=null; render();
};
// 離開目前房間，但回到「輸入房號」的畫面（而非主選單），名字保留
window.leaveToEntry=()=>{
  clearTurnTimer();
  const nm = (net&&net.myName) || loadName();
  if(net&&net.ref&&db){
    const players=(net.room&&net.room.players)||{};
    const humansLeft=Object.keys(players).filter(pid=>pid!==net.playerId && !players[pid].bot);
    net.ref.off();
    if(humansLeft.length===0) db.ref('rooms/'+net.code).remove();   // 真人退光→關房
    else net.ref.child('players/'+net.playerId).remove();
  }
  mode='online';
  net={ phase:'entry', code:null, playerId:getPlayerId(), myName:nm, isHost:false, room:null };

// ====== 線上遊戲本體（房主＝裁判，重用單機引擎）======

// 房主開始遊戲：依房內人數發牌、指派座位 pid、開始監聽動作
window.hostStart=()=>{
  const ids=Object.keys(net.room.players||{});
  if(ids.length<3){ nope('至少 3 人才能開始'); return; }
  const names=ids.map(id=>net.room.players[id].name);
  newGame(names);                                   // 重用單機引擎建局（內部會 render，此時 phase 仍 lobby）
  state.players.forEach((p,i)=>{ p.pid=ids[i]; p.bot=!!net.room.players[ids[i]].bot; });  // 座位 ↔ playerId、機器人標記
  const rs=(net.room&&net.room.scores)||{};
  scores=ids.map(pid=>rs[pid]||0);   // 依房間內 pid 延續系列賽分數（機器人也保留）；新房=0
  WIN_SCORE=10;            // 線上系列賽門檻：先達 10 分者獲勝（常見預設，可調）
  net.started=true; net.phase='game';
  net.turnLimit=30; net.timer=null; net.timerSig=null; net.deadline=null;   // 思考時間初始 30 秒
  const base='rooms/'+net.code;
  db.ref(base+'/status').set('playing');
  db.ref(base+'/status').onDisconnect().set('lobby');   // 房主離線→結束本局回大廳（搭配房主轉移）
  if(!net.actionsAttached){
    db.ref(base+'/actions').on('child_added', s=>{ const a=s.val(); s.ref.remove(); applyAction(a); });
    net.actionsAttached=true;
  }
  broadcast();
  render();
};
// reset=true：清空累積分數（開新賽局）；否則保留分數回大廳，由房主再按開始續玩
window.backToLobby=(reset)=>{
  if(!net||!net.isHost||!db) return;
  if(reset){ db.ref('rooms/'+net.code+'/scores').remove(); scores=[]; }
  db.ref('rooms/'+net.code+'/status').set('lobby');
};
// 機器人：房主在大廳新增/移除（機器人由房主端自動隨機出牌）
window.addBot=()=>{
  if(!net||!net.isHost||!db) return;
  const players=net.room.players||{};
  if(Object.keys(players).length>=8){ nope('已達 8 人上限'); return; }
  const used=Object.keys(players).filter(k=>k.startsWith('bot')).map(k=>+k.slice(3));
  let n=1; while(used.includes(n)) n++;
  db.ref('rooms/'+net.code+'/players/bot'+n).set({ name:'機器人'+n, bot:true, joinedAt:Date.now() });
};
window.removeBot=()=>{
  if(!net||!net.isHost||!db) return;
  const botKeys=Object.keys(net.room.players||{}).filter(k=>k.startsWith('bot'));
  if(botKeys.length){
    const pid=botKeys[botKeys.length-1];
    db.ref('rooms/'+net.code+'/players/'+pid).remove();
    db.ref('rooms/'+net.code+'/scores/'+pid).remove();   // 移除機器人 → 其分數消失
  }
};
function isBot(seat){ return state.players[seat] && state.players[seat].bot; }
// 房主端：若此刻該行動者是機器人，延遲後自動隨機處理（一次一個，靠廣播連鎖）
function botTick(){
  if(!net||!net.isHost||!net.started||state.gameover||net.botTimer) return;
  let job=null;
  if(tradeCollecting()){
    const a=state.current,b=state.pending.target;
    const s=[a,b].find(x=>isBot(x)&&state.players[x].hand.length>0&&state.pending.tradePicks[x]===undefined);
    if(s!=null){ const h=state.players[s].hand; job=()=>applyAction({by:state.players[s].pid,type:'tradePick',payload:h.length>0?(Math.random()*h.length|0):0}); }
  } else if(infoCollecting()){
    const s=state.pending.queue.find(x=>isBot(x)&&state.pending.picks[x]===undefined);
    if(s!=null){ const h=state.players[s].hand; job=()=>applyAction({by:state.players[s].pid,type:'infoSwapPick',payload:Math.random()*h.length|0}); }
  } else {
    const sp=seatPrompt();
    if(sp.actor>=0 && isBot(sp.actor)) job=()=>botAct(sp);
  }
  if(job) net.botTimer=setTimeout(()=>{ net.botTimer=null; job(); }, 900);
}
function botAct(sp){
  const pid=state.players[sp.actor].pid, ui=sp.ui;
  if(ui.kind==='turn'){ const ok=ui.cards.filter(c=>c.ok); if(ok.length) applyAction({by:pid,type:'play',payload:ok[Math.random()*ok.length|0].idx}); }
  else if(ui.kind==='target'){ applyAction({by:pid,type:'target',payload:ui.options[Math.random()*ui.options.length|0].idx}); }
  else if(ui.kind==='pick'){ applyAction({by:pid,type:ui.act,payload:Math.random()*ui.cards.length|0}); }
  else if(ui.kind==='reveal'){ applyAction({by:pid,type:'reveal-ack',payload:null}); }
}

// 算出目前該由誰操作、以及該玩家要顯示的操作 UI（線上跳過 pass 遮擋畫面）
function seatPrompt(){
  if(state.gameover) return {actor:-1, ui:{kind:'over'}};
  const ph=state.phase, pend=state.pending||{}, N=state.players.length;
  const handUI=(i)=>state.players[i].hand.map((c,idx)=>({idx,name:CARDS[c].name,desc:CARDS[c].desc,crime:!!CARDS[c].crime}));
  if(ph==='pass'||ph==='turn'){
    const i=state.current;
    const cards=state.players[i].hand.map((c,idx)=>{ const pl=playable(c); return {idx,name:CARDS[c].name,desc:CARDS[c].desc,crime:!!CARDS[c].crime,ok:pl.ok,why:pl.why||''}; });
    return {actor:i, ui:{kind:'turn', act:'play', cards}};
  }
  if(ph==='target'){
    const opts=state.players.map((p,idx)=>({idx,name:p.name,n:p.hand.length})).filter(o=>o.idx!==state.current);
    return {actor:state.current, ui:{kind:'target', act:'target', cardName:CARDS[pend.card].name, options:opts}};
  }
  if(ph==='tradeGive') return {actor:state.current, ui:{kind:'pick', act:'tradeGive', title:'交易：選一張給 '+pname(pend.target), cards:handUI(state.current)}};
  if(ph==='tradePass'||ph==='tradeReceive') return {actor:pend.target, ui:{kind:'pick', act:'tradeReceive', title:'交易：選一張交換給 '+pname(state.current), cards:handUI(pend.target)}};
  if(ph==='dogPass'||ph==='dogDiscard') return {actor:pend.target, ui:{kind:'pick', act:'dogDiscard', title:'神犬：選一張棄掉', cards:handUI(pend.target)}};
  if(ph==='infoSwapPass'||ph==='infoSwapPick'){ const i=pend.queue[pend.qi]; return {actor:i, ui:{kind:'pick', act:'infoSwapPick', title:'情報交換：選一張傳給左邊（'+pname((i-1+N)%N)+'）', cards:handUI(i)}}; }
  if(ph==='reveal') return {actor:state.current, ui:{kind:'reveal', act:'reveal-ack', title:pend.title, body:pend.body}};
  return {actor:-1, ui:{kind:'wait'}};
}

function cardListFor(i){
  return state.players[i].hand.map((c,idx)=>({idx,name:CARDS[c].name,desc:CARDS[c].desc,crime:!!CARDS[c].crime}));
}
// 線上「同時選牌」的兩種情境
function infoCollecting(){ return (state.phase==='infoSwapPass'||state.phase==='infoSwapPick') && state.pending && state.pending.type==='infoSwap'; }
function tradeCollecting(){ return state.phase==='tradeGive' && state.pending && state.pending.tradePicks; }
// 算出某座位此刻的視圖（含情報交換/交易的同時選牌特例）
function viewForSeat(i){
  const p=state.players[i], N=state.players.length;
  if(tradeCollecting()){
    const a=state.current, b=state.pending.target;
    if((i===a||i===b) && p.hand.length>0 && state.pending.tradePicks[i]===undefined){
      return {hand:p.hand, ui:{kind:'pick', act:'tradePick', title:'交易：選一張與 '+pname(i===a?b:a)+' 交換', cards:cardListFor(i)}};
    }
    return {hand:p.hand, ui:{kind:'wait', who:'雙方交換選牌中…'}};
  }
  if(infoCollecting()){
    if(state.pending.queue.includes(i) && state.pending.picks[i]===undefined){
      return {hand:p.hand, ui:{kind:'pick', act:'infoSwapPick', title:'情報交換：選一張傳給左邊（'+pname((i-1+N)%N)+'）', cards:cardListFor(i)}};
    }
    const remain=state.pending.queue.filter(q=>state.pending.picks[q]===undefined).length;
    return {hand:p.hand, ui:{kind:'wait', who:'其他人選牌中（剩 '+remain+' 人）'}};
  }
  const sp=seatPrompt();
  const ui=(i===sp.actor)? sp.ui : {kind:'wait', who: sp.actor>=0?pname(sp.actor):''};
  return {hand:p.hand, ui};
}
// 線上交易：雙方都選好後同時互換
function resolveTradeOnline(){
  const a=state.current, b=state.pending.target, picks=state.pending.tradePicks;
  const ca=picks[a], cb=picks[b];
  if(ca!=null) removeCard(state.players[a], ca);
  if(cb!=null) removeCard(state.players[b], cb);
  if(ca!=null) state.players[b].hand.push(ca);
  if(cb!=null) state.players[a].hand.push(cb);
  log(`${pname(a)} 與 ${pname(b)} 同時交換了手牌。`);
  state.pending=null; endTurn();
}
// 線上情報交換：全部人都選好後，同時抽離、同時傳給各自左邊
function resolveInfoSwapOnline(){
  const N=state.players.length, picks=state.pending.picks;
  Object.entries(picks).forEach(([i,card])=>{ removeCard(state.players[i], card); });
  Object.entries(picks).forEach(([i,card])=>{ state.players[((+i)+N-1)%N].hand.push(card); });
  log('「情報交換」：全體同時各選一張傳給了左邊。');
  state.pending=null; endTurn();
}

function localPub(){
  const sp=seatPrompt();
  return {
    phase:state.phase, current:state.current, actor:sp.actor,
    log:state.log.slice(0,40), scores:scores.slice(0,state.players.length),
    players:state.players.map(p=>({name:p.name, n:p.hand.length})),
    inspectorTarget: state.inspector? state.inspector.target : -1,
    gameover: state.gameover? {title:state.gameover.title, body:state.gameover.body, matchWinner:(state.gameover.matchWinner==null?-1:state.gameover.matchWinner), easter:!!state.gameover.easter} : null,
    deadline: net.deadline||null, turnLimit: net.turnLimit||30, winScore: WIN_SCORE
  };
}

// 房主把狀態寫進 Firebase：public（公開）+ 每人 view（私密手牌＋提示）
function broadcast(){
  if(!net || !net.isHost || !net.started || !db) return;
  maybeArmTimer();                       // 先校準本步思考計時器（使 deadline 最新）
  const base='rooms/'+net.code, pub=localPub();
  db.ref(base+'/public').set(JSON.parse(JSON.stringify(pub)));
  state.players.forEach((p,i)=>{
    db.ref(base+'/views/'+p.pid).set(JSON.parse(JSON.stringify(viewForSeat(i))));
  });
  const sbp={}; state.players.forEach((p,i)=>{ sbp[p.pid]=scores[i]||0; });   // 累積分數依 pid 存房間(供大廳/續局/機器人保留)
  db.ref(base+'/scores').set(sbp);
  botTick();   // 若輪到機器人，房主自動代打
}

// 房主收到動作：驗證來源與型別，再呼叫對應引擎函式
function applyAction(a){
  if(!a || !net || !net.isHost || state.gameover) return;
  // 交易：雙方同時選（不走單一操作者驗證）
  if(a.type==='tradePick' && tradeCollecting()){
    const a0=state.current, b0=state.pending.target;
    const seat=state.players.findIndex(p=>p.pid===a.by);
    if((seat===a0||seat===b0) && state.players[seat].hand.length>0 && state.pending.tradePicks[seat]===undefined){
      state.pending.tradePicks[seat]=state.players[seat].hand[a.payload];
      const req=[a0,b0].filter(s=>state.players[s].hand.length>0);
      if(req.every(s=>state.pending.tradePicks[s]!==undefined)){ clearTurnTimer(); net.turnLimit=30; resolveTradeOnline(); }
      else broadcast();
    }
    return;
  }
  // 情報交換：全體同時選（多人並行，不走單一操作者驗證）
  if(a.type==='infoSwapPick' && state.pending && state.pending.type==='infoSwap'
     && (state.phase==='infoSwapPass'||state.phase==='infoSwapPick')){
    const seat=state.players.findIndex(p=>p.pid===a.by);
    if(seat>=0 && state.pending.queue.includes(seat) && state.pending.picks[seat]===undefined){
      state.pending.picks[seat]=state.players[seat].hand[a.payload];
      if(state.pending.queue.every(q=>state.pending.picks[q]!==undefined)){ clearTurnTimer(); net.turnLimit=30; resolveInfoSwapOnline(); }
      else broadcast();
    }
    return;
  }
  const sp=seatPrompt();
  if(sp.actor<0) return;
  if(a.by!==state.players[sp.actor].pid) return;   // 只接受「該操作的人」
  if(a.type!==sp.ui.act) return;                    // 型別需符合當前期待
  clearTurnTimer(); net.turnLimit=30;               // 有人正常行動 → 思考時間恢復 30 秒
  switch(a.type){
    case 'play': playCard(a.payload); break;
    case 'target': chooseTarget(a.payload); break;
    case 'tradeGive': doTradeGive(a.payload); break;
    case 'tradeReceive': tradeReceiveCard(a.payload); break;
    case 'dogDiscard': dogDiscard(a.payload); break;
    case 'infoSwapPick': infoSwapPick(a.payload); break;
    case 'reveal-ack': afterReveal(); break;
  }
  broadcast();
}

// ---- 思考時間限制（房主端）：初始30秒；超時自動隨機出牌且降為10秒；有人正常行動後恢復30秒 ----
function clearTurnTimer(){ if(net&&net.timer){ clearTimeout(net.timer); net.timer=null; } if(net&&net.botTimer){ clearTimeout(net.botTimer); net.botTimer=null; } if(net) net.timerSig=null; }
function maybeArmTimer(){
  if(!net || !net.isHost) return;
  if(state.gameover){ clearTurnTimer(); net.deadline=null; return; }
  const collecting = infoCollecting() || tradeCollecting();
  const sp = collecting? {actor:0} : seatPrompt();
  if(sp.actor<0 && !collecting){ clearTurnTimer(); net.deadline=null; return; }
  const sig = collecting? 'swap' : (state.phase+':'+sp.actor);
  if(sig===net.timerSig) return;          // 同一步：不重設，沿用原本的 deadline
  if(net.timer) clearTimeout(net.timer);
  net.timerSig=sig;
  const ms=(net.turnLimit||30)*1000;
  net.deadline=Date.now()+ms;
  net.timer=setTimeout(autoPlay, ms);
}
function autoPlay(){
  if(!net || !net.isHost || state.gameover) return;
  net.timer=null;
  net.turnLimit=10;                        // 超時懲罰：後續變 10 秒
  if(tradeCollecting()){
    const a=state.current,b=state.pending.target;
    [a,b].forEach(s=>{ if(state.players[s].hand.length>0 && state.pending.tradePicks[s]===undefined){ const h=state.players[s].hand; state.pending.tradePicks[s]=h[Math.random()*h.length|0]; } });
    log('交易思考超時，未選者自動隨機。'); resolveTradeOnline(); return;
  }
  if(infoCollecting()){
    state.pending.queue.forEach(seat=>{ if(state.pending.picks[seat]===undefined){ const h=state.players[seat].hand; state.pending.picks[seat]=h[Math.random()*h.length|0]; } });
    log('情報交換思考超時，未選者自動隨機。'); resolveInfoSwapOnline(); return;
  }
  const sp=seatPrompt(); if(sp.actor<0) return; const ui=sp.ui;
  const who=pname(sp.actor);
  if(ui.kind==='turn'){
    const ok=ui.cards.filter(c=>c.ok);
    if(ok.length){ const pick=ok[Math.random()*ok.length|0]; log(`${who} 思考超時，自動打出「${pick.name}」。`); playCard(pick.idx); }
    else { log(`${who} 思考超時且沒有可打的牌，跳過。`); endTurn(); }
  }
  else if(ui.kind==='target'){ const o=ui.options[Math.random()*ui.options.length|0]; log(`${who} 思考超時，自動指定 ${o.name}。`); chooseTarget(o.idx); }
  else if(ui.kind==='pick'){ const i=Math.random()*ui.cards.length|0; const cn=ui.cards[i]?ui.cards[i].name:''; log(`${who} 思考超時，自動選了「${cn}」。`); if(ui.act==='tradeGive')doTradeGive(i); else if(ui.act==='tradeReceive')tradeReceiveCard(i); else if(ui.act==='dogDiscard')dogDiscard(i); }
  else if(ui.kind==='reveal'){ log(`${who} 思考超時，自動繼續。`); afterReveal(); }
  broadcast();
}
function startCountdownTicker(){
  if(net.cdStarted) return; net.cdStarted=true;
  setInterval(()=>{
    if(!net || net.phase!=='game') return;
    const el=document.getElementById('cd'); if(!el) return;
    const dl = net.isHost? net.deadline : (net.pub&&net.pub.deadline);
    if(!dl){ el.textContent=''; return; }
    el.textContent='⏱ '+Math.max(0,Math.ceil((dl-Date.now())/1000))+' 秒';
  }, 300);
}

// 玩家送出動作：房主直接套用、其他人 push 到 Firebase
window.netAct=(type,payload)=>{
  const a={by:net.playerId, type, payload:(payload===undefined?null:payload), at:Date.now()};
  if(net.isHost) applyAction(a);
  else db.ref('rooms/'+net.code+'/actions').push(a);
};

// 一般玩家：訂閱 public 與自己的 view
function subscribeGame(){
  if(net.gameSub) return; net.gameSub=true;
  const base='rooms/'+net.code;
  db.ref(base+'/public').on('value', s=>{ net.pub=s.val(); if(net.phase==='game') render(); });
  db.ref(base+'/views/'+net.playerId).on('value', s=>{ net.view=s.val(); if(net.phase==='game') render(); });
}

function netGame(){
  startCountdownTicker();
  if(net.isHost){
    broadcast();
    const hi=state.players.findIndex(p=>p.pid===net.playerId);
    if(hi<0){ app.innerHTML='<div class="panel center">準備中…</div>'; return; }
    renderGameView(localPub(), viewForSeat(hi));
  } else {
    if(!net.pub){ app.innerHTML='<div class="panel center">載入中…</div>'; return; }
    renderGameView(net.pub, net.view||{hand:[],ui:{kind:'wait'}});
  }
}

function renderGameView(pub, view){
  if(pub && pub.gameover){ return renderNetGameOver(pub); }
  const ui=(view&&view.ui)||{kind:'wait'};
  let area='';
  if(ui.kind==='turn'){
    const cards=ui.cards.map(c=>`<div class="card ${c.crime?'crime':''} ${c.ok?'playable':'disabled'}" onclick="${c.ok?`netAct('play',${c.idx})`:`nope('${c.why}')`}"><div class="cname">${c.name}</div><div class="cdesc">${c.desc}</div>${c.ok?'':`<div class="cwhy">✗ ${c.why}</div>`}</div>`).join('');
    area=`<div class="big">輪到你了</div><div class="hand">${cards}</div>`;
  } else if(ui.kind==='target'){
    area=`<div class="big">${ui.cardName}：選擇目標</div>`+ui.options.map(o=>`<button onclick="netAct('target',${o.idx})">${o.name}（${o.n}張）</button>`).join(' ');
  } else if(ui.kind==='pick'){
    const cards=ui.cards.map(c=>`<div class="card ${c.crime?'crime':''} playable" onclick="netAct('${ui.act}',${c.idx})"><div class="cname">${c.name}</div><div class="cdesc">${c.desc}</div></div>`).join('');
    area=`<div class="big">${ui.title}</div><div class="hand">${cards}</div>`;
  } else if(ui.kind==='reveal'){
    area=`<div class="big">${ui.title}</div><div style="line-height:1.8">${ui.body}</div><button onclick="netAct('reveal-ack',null)">繼續 ▶</button>`;
  } else {
    const hand=(view&&view.hand)||[];
    const cards=hand.map(c=>`<div class="card ${CARDS[c]&&CARDS[c].crime?'crime':''} disabled"><div class="cname">${CARDS[c]?CARDS[c].name:c}</div><div class="cdesc">${CARDS[c]?CARDS[c].desc:''}</div></div>`).join('');
    area=`<div class="big">等待 ${ui.who||'其他玩家'}…</div><div class="sub">你的手牌（輪到你才能點）</div><div class="hand">${cards||'（空手）'}</div>`;
  }
  const strip = pub&&pub.players ? `<div class="sub" style="margin-top:8px">總分　${pub.players.map((p,i)=>p.name+' '+(pub.scores?pub.scores[i]:0)).join('　·　')}</div>` : '';
  const insp = pub&&pub.inspectorTarget>=0 ? `<div class="panel center" style="border-color:#ffd34d;padding:10px;margin-top:10px">👮 警部盯著 <b style="color:#ffd34d">${pub.players[pub.inspectorTarget].name}</b></div>` : '';
  const logH = pub&&pub.log ? `<div class="log">${pub.log.map(l=>`<div>${l}</div>`).join('')}</div>` : '';
  app.innerHTML=`<div class="panel"><div class="sub">房號 ${net.code} <span id="cd" style="color:#ffd34d;font-weight:700"></span></div>${area}${strip}</div>${insp}${logH}`;
}

function renderNetGameOver(pub){
  const g=pub.gameover, villain=/逃脫/.test(g.title), target=pub.winScore||10;
  const celebrate = villain
    ? `<img src="https://media.giphy.com/media/8EX8UxSNLRp5AonNfv/giphy.gif" style="max-width:280px;width:80%;border-radius:14px;margin:10px auto;display:block">`
    : `<div class="dancers"><span>🕺</span><span>💃</span><span>🕺</span><span>💃</span><span>🕺</span></div>`;
  const rows=pub.players.map((p,i)=>({name:p.name,s:pub.scores?pub.scores[i]:0})).sort((a,b)=>b.s-a.s).map(r=>`<div style="padding:3px 0">${r.name}：<b>${r.s}</b></div>`).join('');
  let footer;
  if(g.matchWinner>=0){            // 有人達到門檻 → 系列賽結束
    footer=`<div class="panel win center" style="border-color:#ffd34d"><div class="big" style="font-size:1.7rem;color:#ffd34d">🏆 ${pub.players[g.matchWinner].name} 達 ${target} 分，贏得整場！</div></div>`+
      `<div class="panel center">`+(net.isHost?`<button onclick="backToLobby(true)">回大廳（開新賽局，分數歸零）</button>`:`<div class="sub">系列賽結束，等待房主</div>`)+`<button class="ghost" onclick="leaveToEntry()">離開（回輸房號畫面）</button></div>`;
  } else {                         // 尚未分出整場 → 回大廳續玩(分數保留)
    footer=`<div class="panel center">`+
      (net.isHost ? `<button onclick="backToLobby(false)">再來一局（回大廳，分數續累積）</button>` : `<div class="sub">等待房主再開一局…</div>`)+
      `<button class="ghost" onclick="leaveToEntry()">離開（回輸房號畫面）</button></div>`;
  }
  app.innerHTML=(g.easter?fireworksHtml():'')+`<div class="panel win center">${g.easter?'':celebrate}<div class="big" style="font-size:1.6rem">🎉 ${g.title}</div><div style="line-height:1.8">${g.body}</div></div>`+
    `<div class="panel"><div class="big">📊 總分（先達 ${target} 分獲勝）</div>${rows}</div>`+footer;
}

function netRender(){
  if(!net){ renderLanding(); return; }
  if(net.phase==='game') return netGame();
  if(net.phase==='entry') return netEntry();
  return netLobby();
}

function netEntry(){
  app.innerHTML=`
    <div class="panel">
      <div class="big">🌐 線上連線</div>
      <input id="myname" placeholder="你的名字" value="${net.myName||''}">
      <button onclick="createRoom()">建立新房間（你當房主）</button>
      <hr style="border-color:#4a3d80;margin:14px 0">
      <input id="roomcode" placeholder="輸入房號（4 個字）" maxlength="4" style="text-transform:uppercase">
      <button onclick="joinRoom()">加入房間</button>
      <button class="ghost" onclick="net=null;mode=null;render()">← 回主選單</button>
    </div>`;
}

function netLobby(){
  const room=net.room||{};
  const entries=room.players?Object.entries(room.players):[];
  const rs=room.scores||{};
  const chips=entries.map(([id,p])=>`<span class="badge">${p.bot?'🤖 ':''}${p.name}${id===room.host?' 👑':''}${id===net.playerId?'（你）':''}${rs[id]?' '+rs[id]+'分':''}</span>`).join(' ');
  const n=entries.length, canStart=net.isHost && n>=3;
  const hasScores=Object.values(rs).some(v=>v>0);
  const botCount=entries.filter(([,p])=>p.bot).length;
  app.innerHTML=`
    <div class="panel center">
      <div class="big">房號：<span style="color:#ffd34d;letter-spacing:3px">${net.code||''}</span></div>
      <div class="sub">把房號給朋友，請他們選「線上連線 → 加入房間」（最多 8 人）</div>
    </div>
    <div class="panel">
      <div class="big">玩家（${n}/8）</div>
      <div style="margin:10px 0">${chips||'（等待加入…）'}</div>
      ${net.isHost ? `<div style="margin:8px 0">
          <button class="ghost" onclick="addBot()" ${n>=8?'disabled':''}>＋ 加機器人</button>
          <button class="ghost" onclick="removeBot()" ${botCount===0?'disabled':''}>－ 移除機器人</button>
        </div>` : ''}
      ${hasScores?`<div class="sub">📊 系列賽進行中（先達 10 分者勝），分數延續累積</div>`:''}
      ${net.isHost
        ? `<button onclick="hostStart()" ${canStart?'':'disabled'}>${canStart?(hasScores?'開始下一局':'開始遊戲'):'至少 3 人才能開始…'}</button>`
        : `<div class="sub">等待房主開始遊戲…</div>`}
      <button class="ghost" onclick="leaveRoom()">離開房間</button>
    </div>`;
}

// 啟動
render();
</script>
</body>
</html>
